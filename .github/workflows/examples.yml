name: Render Examples

on:
  pull_request:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra pandas --no-default-groups

      - name: Run basic example
        working-directory: examples/basic
        run: uv run --frozen --extra pandas --no-default-groups python basic.py

      - name: Run custom example
        working-directory: examples/custom
        run: uv run --frozen --no-default-groups python custom.py

      - name: Run invoice example
        working-directory: examples/invoice
        run: uv run --frozen --no-default-groups python invoice.py

      - name: Run letter example
        working-directory: examples/letter
        run: uv run --frozen --no-default-groups python letter.py

      - name: Run presentation example
        working-directory: examples/presentation
        run: uv run --frozen --no-default-groups python presentation.py

      - name: Run translations example
        working-directory: examples/translations
        run: uv run --frozen --no-default-groups python translations.py

      - name: Upload rendered PDFs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-examples
          path: examples/**/*.pdf

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- rendered-examples-comment -->';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${marker}
            ## Rendered Examples

            The rendered PDF examples are available for download on this workflow run:
            [Download rendered-examples](${runUrl})

            > Last rendered on commit ${context.sha.slice(0, 7)}`;

                        const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        });

                        const existing = comments.find(c => c.body.includes(marker));
                        if (existing) {
                        await github.rest.issues.updateComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            comment_id: existing.id,
                            body,
                        });
                        } else {
                        await github.rest.issues.createComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: context.issue.number,
                            body,
                        });
                        }
