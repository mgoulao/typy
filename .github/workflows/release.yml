name: Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen --group tests --no-default-groups
      - run: uv run --frozen --group tests --no-default-groups pytest

  bump:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha:     ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and lockfile
        run: |
          uv version --bump ${{ inputs.bump }}
          uv lock

      - id: version
        run: echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - id: commit
        run: |
          git add pyproject.toml uv.lock
          git commit -m "Release v${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" \
                  -m "Release v${{ steps.version.outputs.version }}"
          git push --follow-tags
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish-pypi:
    needs: bump
    runs-on: ubuntu-latest
    environment: pypi          # configure required reviewers here for extra safety
    permissions:
      id-token: write          # OIDC for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.bump.outputs.sha }}
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv build
      # Smoke-test that the artifacts actually install and import
      - run: uv run --isolated --no-project --with dist/*.whl    -- python -c "import typy"
      - run: uv run --isolated --no-project --with dist/*.tar.gz -- python -c "import typy"
      - run: uv publish

  github-release:
    needs: [bump, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name:         v${{ needs.bump.outputs.version }}
          target_commitish: ${{ needs.bump.outputs.sha }}
          generate_release_notes: true