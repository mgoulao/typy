name: Publish
on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release ref
        id: release_ref
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            git fetch --tags --force
            sha="${{ github.event.workflow_run.head_sha }}"
            tag="$(git tag --points-at "$sha" | grep '^v' | head -n1)"
            if [ -z "$tag" ]; then
              echo "No v* tag found for release commit $sha"
              exit 1
            fi
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "sha=$sha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group tests --no-default-groups

      - name: Run tests
        run: uv run --frozen --group tests --no-default-groups pytest

      - name: Build
        run: uv build

      # Uncomment when ready to publish to PyPI:
      # - run: uv publish

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_ref.outputs.tag }}
          target_commitish: ${{ steps.release_ref.outputs.sha }}
          generate_release_notes: true
