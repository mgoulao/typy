name: Publish
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: tag
        run: |
          tag=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | sort -V | tail -n 1)
          if [ -z "$tag" ]; then
            echo "No v* tag found for commit ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group tests --no-default-groups

      - name: Run tests
        run: uv run --frozen --group tests --no-default-groups pytest

      - name: Build
        run: uv build

      # Uncomment when ready to publish to PyPI:
      # - run: uv publish

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
