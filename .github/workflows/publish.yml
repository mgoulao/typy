name: Publish
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Build
        run: uv build

      # Uncomment when ready to publish to PyPI:
      # - run: uv publish

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
