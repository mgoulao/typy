name: Publish
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group tests --no-default-groups

      - name: Run tests
        run: uv run --frozen --group tests --no-default-groups pytest

      - name: Build
        run: uv build

      # Uncomment when ready to publish to PyPI:
      # - run: uv publish

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
